<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Observer Vector Debug</title>
<style>
  :root {
    --bg: #0a0a0f; --card: #12121a; --border: #1e1e2e;
    --text: #c8c8d4; --dim: #6b6b80; --accent: #6366f1;
    --pos: #22c55e; --neg: #ef4444; --warn: #f59e0b;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'SF Mono', 'Fira Code', monospace; background: var(--bg); color: var(--text); padding: 16px; font-size: 13px; }
  h1 { font-size: 18px; color: #fff; margin-bottom: 4px; }
  .subtitle { color: var(--dim); font-size: 12px; margin-bottom: 16px; }
  .controls { display: flex; gap: 8px; margin-bottom: 16px; align-items: center; flex-wrap: wrap; }
  input, select, button { font-family: inherit; font-size: 12px; background: var(--card); color: var(--text); border: 1px solid var(--border); padding: 6px 10px; border-radius: 4px; }
  button { cursor: pointer; background: var(--accent); color: #fff; border-color: var(--accent); }
  button:hover { opacity: 0.85; }
  button.secondary { background: var(--card); color: var(--text); border-color: var(--border); }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 12px; }
  .layer-card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 12px; }
  .layer-title { font-size: 13px; font-weight: 600; color: #fff; margin-bottom: 8px; display: flex; justify-content: space-between; }
  .layer-title .tag { font-size: 10px; color: var(--dim); background: var(--bg); padding: 2px 6px; border-radius: 3px; }
  .dim-row { display: flex; align-items: center; margin-bottom: 4px; gap: 6px; }
  .dim-name { width: 140px; font-size: 11px; color: var(--dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .dim-bar-bg { flex: 1; height: 14px; background: var(--bg); border-radius: 2px; position: relative; overflow: hidden; }
  .dim-bar { height: 100%; border-radius: 2px; transition: width 0.4s ease, background 0.4s ease; }
  .dim-bar.neutral { background: #4b5563; }
  .dim-bar.high { background: var(--accent); }
  .dim-bar.very-high { background: var(--pos); }
  .dim-bar.low { background: var(--warn); }
  .dim-val { width: 40px; text-align: right; font-size: 11px; font-weight: 600; }
  .dim-delta { width: 55px; text-align: right; font-size: 10px; }
  .dim-delta.pos { color: var(--pos); }
  .dim-delta.neg { color: var(--neg); }
  .meta-bar { display: flex; gap: 16px; margin-bottom: 16px; flex-wrap: wrap; }
  .meta-item { background: var(--card); border: 1px solid var(--border); border-radius: 6px; padding: 8px 12px; }
  .meta-label { font-size: 10px; color: var(--dim); text-transform: uppercase; }
  .meta-value { font-size: 16px; font-weight: 700; color: #fff; }
  .log-panel { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 12px; margin-top: 16px; max-height: 300px; overflow-y: auto; }
  .log-panel h3 { font-size: 13px; color: #fff; margin-bottom: 8px; }
  .log-entry { font-size: 11px; padding: 3px 0; border-bottom: 1px solid var(--border); }
  #status { font-size: 11px; padding: 4px 8px; border-radius: 3px; }
  #status.ok { background: #052e16; color: var(--pos); }
  #status.err { background: #2a0808; color: var(--neg); }
  .test-section { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 12px; margin-top: 16px; }
  .test-section h3 { font-size: 13px; color: #fff; margin-bottom: 8px; }
  textarea { width: 100%; font-family: inherit; font-size: 12px; background: var(--bg); color: var(--text); border: 1px solid var(--border); padding: 8px; border-radius: 4px; resize: vertical; }
</style>
</head>
<body>

<h1>Observer Vector Debug</h1>
<p class="subtitle">67-dim Bayesian profile + store backprop debug</p>

<div class="controls">
  <label>Server:</label>
  <input id="server" value="http://localhost:8001" style="width:220px">
  <label>Token:</label>
  <input id="token" value="dev-test-token" style="width:120px" type="password">
  <label>Observer:</label>
  <input id="observer-id" value="user:txt4195@gmail.com" style="width:200px">
  <button onclick="loadObserver()">Load</button>
  <button onclick="createObserver()" class="secondary">Create (Korean Dev)</button>
  <span id="status"></span>
</div>

<div class="meta-bar" id="meta-bar"></div>
<div class="grid" id="layers-grid"></div>

<div class="test-section">
  <h3>Store + Watch Backprop</h3>
  <div style="display:flex;gap:8px;margin-bottom:8px;align-items:end">
    <div style="flex:1">
      <label style="font-size:11px;color:var(--dim)">Content</label>
      <textarea id="test-content" rows="2">Bayesian observer backprop works</textarea>
    </div>
    <div>
      <label style="font-size:11px;color:var(--dim)">Importance</label>
      <input id="test-importance" value="0.8" style="width:60px">
    </div>
    <button onclick="storeAndWatch()">Store &amp; Watch</button>
  </div>
</div>

<div class="log-panel">
  <h3>Event Log</h3>
  <div id="log"></div>
</div>

<script>
const LAYER_META = {
  SCORE_CULTURE:    { label: 'Culture',    tag: 'overstory' },
  SCORE_IDEOLOGY:   { label: 'Ideology',   tag: 'overstory' },
  SCORE_RELIGION:   { label: 'Religion',   tag: 'overstory' },
  SCORE_BELIEF:     { label: 'Belief',     tag: 'overstory' },
  SCORE_SEX:        { label: 'Sex',        tag: 'overstory' },
  SCORE_META:       { label: 'Meta',       tag: 'lower' },
  SCORE_COGNITIVE:  { label: 'Cognitive',  tag: 'lower' },
  SCORE_PROCESSING: { label: 'Processing', tag: 'lower' },
};

let prevValues = {};

function $(id) { return document.getElementById(id); }
function cfg() {
  return {
    server: $('server').value.replace(/\/$/,''),
    token: $('token').value,
    id: $('observer-id').value,
  };
}

function setStatus(ok, msg) {
  const el = $('status');
  el.textContent = msg;
  el.className = ok ? 'ok' : 'err';
}

function addLog(action, detail) {
  const ts = new Date().toLocaleTimeString();
  const entry = document.createElement('div');
  entry.className = 'log-entry';
  const tsSpan = document.createElement('span');
  tsSpan.className = 'ts';
  tsSpan.textContent = ts + ' ';
  const actSpan = document.createElement('span');
  actSpan.className = 'action';
  actSpan.textContent = action + ' ';
  const detSpan = document.createElement('span');
  detSpan.className = 'detail';
  detSpan.textContent = detail;
  entry.appendChild(tsSpan);
  entry.appendChild(actSpan);
  entry.appendChild(detSpan);
  $('log').prepend(entry);
}

async function api(method, path, body) {
  const c = cfg();
  const opts = {
    method,
    headers: { 'X-API-Key': c.token, 'Content-Type': 'application/json' },
  };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(c.server + path, opts);
  const data = await r.json();
  if (!r.ok) throw new Error(data.description || data.error || r.statusText);
  return data;
}

function barClass(v) {
  if (v >= 0.7) return 'very-high';
  if (v >= 0.55) return 'high';
  if (v <= 0.3) return 'low';
  return 'neutral';
}

function renderObserver(data) {
  const values = data.values || {};
  const metaScore = data.meta_cognition_score || 0.5;
  let totalDims = 0;
  Object.values(values).forEach(layer => { totalDims += Object.keys(layer).length; });

  // Meta bar
  const metaBar = $('meta-bar');
  metaBar.textContent = '';
  const items = [
    ['Observer', data.observer_id],
    ['Meta LR', metaScore.toFixed(3)],
    ['Dimensions', String(totalDims)],
  ];
  items.forEach(([label, value]) => {
    const item = document.createElement('div');
    item.className = 'meta-item';
    const lbl = document.createElement('div');
    lbl.className = 'meta-label';
    lbl.textContent = label;
    const val = document.createElement('div');
    val.className = 'meta-value';
    val.textContent = value;
    item.appendChild(lbl);
    item.appendChild(val);
    metaBar.appendChild(item);
  });

  // Layer cards
  const grid = $('layers-grid');
  grid.textContent = '';

  for (const [layer, meta] of Object.entries(LAYER_META)) {
    const dims = values[layer] || {};
    const card = document.createElement('div');
    card.className = 'layer-card';

    // Title
    const title = document.createElement('div');
    title.className = 'layer-title';
    const titleText = document.createTextNode(meta.label);
    const tag = document.createElement('span');
    tag.className = 'tag';
    tag.textContent = meta.tag + ' \u00b7 ' + Object.keys(dims).length + 'd';
    title.appendChild(titleText);
    title.appendChild(tag);
    card.appendChild(title);

    // Dimensions
    for (const [dim, val] of Object.entries(dims)) {
      const prevKey = layer + '.' + dim;
      const prev = prevValues[prevKey];
      const delta = prev !== undefined ? val - prev : 0;

      const row = document.createElement('div');
      row.className = 'dim-row';

      const nameSpan = document.createElement('span');
      nameSpan.className = 'dim-name';
      nameSpan.title = dim;
      nameSpan.textContent = dim;

      const barBg = document.createElement('div');
      barBg.className = 'dim-bar-bg';
      const bar = document.createElement('div');
      bar.className = 'dim-bar ' + barClass(val);
      bar.style.width = (val * 100).toFixed(1) + '%';
      barBg.appendChild(bar);

      const valSpan = document.createElement('span');
      valSpan.className = 'dim-val';
      valSpan.textContent = val.toFixed(3);

      const deltaSpan = document.createElement('span');
      deltaSpan.className = 'dim-delta';
      if (Math.abs(delta) > 0.0001) {
        deltaSpan.classList.add(delta > 0 ? 'pos' : 'neg');
        deltaSpan.textContent = (delta > 0 ? '+' : '') + delta.toFixed(4);
      }

      row.appendChild(nameSpan);
      row.appendChild(barBg);
      row.appendChild(valSpan);
      row.appendChild(deltaSpan);
      card.appendChild(row);

      prevValues[prevKey] = val;
    }

    grid.appendChild(card);
  }
}

async function loadObserver() {
  try {
    const data = await api('GET', '/observer/' + encodeURIComponent(cfg().id));
    renderObserver(data);
    setStatus(true, 'loaded');
    addLog('LOAD', cfg().id + ' meta_lr=' + (data.meta_cognition_score||0).toFixed(3));
  } catch(e) {
    setStatus(false, e.message);
    addLog('ERROR', e.message);
  }
}

async function createObserver() {
  try {
    const data = await api('POST', '/observer/' + encodeURIComponent(cfg().id), {
      nationality: 'korean', role: 'developer'
    });
    renderObserver(data);
    setStatus(true, 'created');
    addLog('CREATE', cfg().id + ' korean developer priors');
  } catch(e) {
    setStatus(false, e.message);
    addLog('ERROR', e.message);
  }
}

async function storeAndWatch() {
  const content = $('test-content').value;
  const importance = parseFloat($('test-importance').value) || 0.5;
  const c = cfg();

  addLog('STORE', 'importance=' + importance + ' "' + content.slice(0,50) + '..."');

  try {
    const storeData = await api('POST', '/memory', {
      content: content,
      importance: importance,
      tags: [c.id, 'domain:dev', 'kind:insight', 'test:observer-debug'],
    });
    const memId = storeData.id || storeData.memory_id || '?';
    addLog('STORED', 'id=' + memId);
    setStatus(true, 'stored ' + memId.slice(0,8));

    // Poll enrichment then reload observer
    addLog('ENRICH', 'waiting for pipeline...');
    let attempts = 0;
    const poll = setInterval(async () => {
      attempts++;
      try {
        const es = await api('GET', '/enrichment/status');
        const qd = es.queue_depth || 0;
        addLog('POLL', 'queue=' + qd + ' attempt=' + attempts);
        if (qd === 0 || attempts > 15) {
          clearInterval(poll);
          await loadObserver();
          addLog('BACKPROP', 'observer reloaded — check deltas above');
        }
      } catch(e) {
        addLog('POLL_ERR', e.message);
        if (attempts > 15) clearInterval(poll);
      }
    }, 2000);
  } catch(e) {
    setStatus(false, e.message);
    addLog('ERROR', e.message);
  }
}

window.addEventListener('load', () => { loadObserver().catch(() => {}); });
</script>
</body>
</html>
